name: Build & test

on:
  push:
    branches-ignore: [ "main" ]
    tags-ignore: 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'

    - name: Download dependencies
      run: go mod download

    - name: Lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.11.3

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -race -v ./...
