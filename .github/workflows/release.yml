name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test -race -v ./...

      - name: Build all platforms
        run: |
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "windows/amd64"
            "windows/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )
          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="http-proxy-logger-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              output="${output}.exe"
            fi
            echo "Building ${output}..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -ldflags="-s -w" -o "$output"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            http-proxy-logger-linux-amd64
            http-proxy-logger-linux-arm64
            http-proxy-logger-windows-amd64.exe
            http-proxy-logger-windows-arm64.exe
            http-proxy-logger-darwin-amd64
            http-proxy-logger-darwin-arm64
